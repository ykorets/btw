# FERC eLibrary keyword watcher. Probe 2026-07-13: the JS UI fronts a clean
# keyless JSON API — POST eLibraryWebAPI/api/Search/AdvancedSearch with a
# filed-date window; response = {searchHits: [...], totalHits}. NB their
# field really is spelled "acesssionNumber". Live check: 12 hits for
# "data center" (description search) over the trailing week, incl. Data
# Center Coalition intervention in EL26-72.
id: ferc-elibrary
kind: api
adapter: ferc_search
url: https://elibrary.ferc.gov/eLibraryWebAPI/api/Search/AdvancedSearch
schedule: daily
slo_interval_days: 7
params:
  query: "data center"
  window_days: 7
  max_results: 100
keywords:
  - behind-the-meter
  - colocat      # colocated / colocation
  - co-locat
  - interconnection
  - gas turbine
  - generation facility
