# TCEQ NSR pending applications — the primary Texas watcher.
# POSTs the public NSR search (ASCII output mode) for applications received
# in the trailing window; every row becomes a candidate, keyword hits flagged.
id: tceq-nsr-stdpmt
kind: search
adapter: tceq_nsr
url: https://www2.tceq.texas.gov/airperm/index.cfm?fuseaction=airpermits.validate_search_criteria
schedule: daily
slo_interval_days: 3
params:
  permit_type: STDPMT      # standard permits (incl. Electric Generating Units SP)
  window_days: 30
keywords:
  - turbine
  - generat
  - electric
  - power
  - energy
  - data cent
  - crusoe
  - vantor
  - stargate
