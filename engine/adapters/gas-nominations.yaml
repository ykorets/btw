# Gas pulse for Southaven C2 — the continuous "is it running" signal between
# satellite snapshots (IW-v1; recon: docs/island-watch/gas-recon-2026-07.md).
# Probe 2026-07-13: GasQuest backend is a clean JSON API —
#   list:     POST {url}/infopostdetails {infoPostID:1, tspId:100000, ...}
#   download: GET  {url}/postings?postingsDocumentId=<infoPostTrackerID>
#             (CSV served base64-encoded)
# Live check at probe time: Loc 26096 "MZX Southaven" (zone 1, DPQ delivery),
# gas day 20260713 TD2: Total Scheduled Quantity 177,000 MMBtu.
# One candidate per (location, gas day); zero scheduled flow -> kw_hit (the
# anomaly worth surfacing). ABILENE has no public EBB — honest limit, see recon.
id: gas-nominations
kind: api
adapter: gas_ebb
url: "https://reporting.prod.bwpmlp.org/infopost"
schedule: daily
slo_interval_days: 7
params:
  tsp_id: 100000        # Texas Gas Transmission (Boardwalk internal tspId)
  info_post_id: 1       # Operational Capacity report
  locations: ["MZX"]    # substring match on Loc Name
