name: Publish MCP Registry

on:
  workflow_dispatch:
  push:
    tags:
      - "mcp-v*"

permissions:
  contents: read

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    defaults:
      run:
        working-directory: mcp
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Verify release tag matches server version
        if: github.ref_type == 'tag'
        shell: bash
        run: |
          expected="mcp-v$(jq -r .version server.json)"
          if [[ "${GITHUB_REF_NAME}" != "${expected}" ]]; then
            echo "Tag ${GITHUB_REF_NAME} does not match ${expected}."
            exit 1
          fi

      - name: Install MCP publisher
        shell: bash
        run: |
          os="$(uname -s | tr '[:upper:]' '[:lower:]')"
          arch="$(uname -m | sed 's/x86_64/amd64/;s/aarch64/arm64/')"
          curl --fail --location --silent --show-error \
            "https://github.com/modelcontextprotocol/registry/releases/latest/download/mcp-publisher_${os}_${arch}.tar.gz" \
            --output /tmp/mcp-publisher.tar.gz
          tar -xzf /tmp/mcp-publisher.tar.gz mcp-publisher

      - name: Authenticate with GitHub OIDC
        run: ./mcp-publisher login github-oidc

      - name: Publish remote server
        run: ./mcp-publisher publish
