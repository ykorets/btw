name: extract-genesis
on:
  workflow_dispatch:
    inputs:
      role:
        description: "models.yaml role for the primary pass (per-model evals)"
        default: "default_extractor"
      quorum:
        description: "cross-check with a second family per D9"
        type: boolean
        default: false
      compare:
        description: "print per-extractor_version recall/precision/cost table"
        type: boolean
        default: false
      genres:
        description: "comma list of doc_genre values to extract"
        default: "tceq_standard_permit_review,appeal_filing,advocacy_letter,mdeq_psd_permit,permit,court_filing"
      sha:
        description: "optional archived document sha256; overrides genres"
        default: ""
jobs:
  extract:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: {python-version: "3.12"}
      - run: pip install httpx boto3 pyyaml litellm pypdf rapidfuzz
      - name: Extract anchored claims from archived genesis documents
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
          R2_ACCOUNT_ID: "5ee73f367499e0cda9acfbd5966274e5"
          R2_ACCESS_KEY: ${{ secrets.R2_ACCESS_KEY }}
          R2_SECRET: ${{ secrets.R2_SECRET }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          BTW_MODELS_YAML: engine/models.yaml
          DOCUMENT_SHA: ${{ inputs.sha }}
          DOCUMENT_GENRES: ${{ inputs.genres || 'tceq_standard_permit_review,appeal_filing,advocacy_letter,mdeq_psd_permit,permit,court_filing' }}
          EXTRACTOR_ROLE: ${{ inputs.role || 'default_extractor' }}
          QUORUM_FLAG: ${{ inputs.quorum && '--quorum' || '' }}
        run: |
          if [ -n "$DOCUMENT_SHA" ]; then
            PYTHONPATH=engine/src python -m btw_engine.extract --sha "$DOCUMENT_SHA" --role "$EXTRACTOR_ROLE" $QUORUM_FLAG
          else
            PYTHONPATH=engine/src python -m btw_engine.extract --genres "$DOCUMENT_GENRES" --role "$EXTRACTOR_ROLE" $QUORUM_FLAG
          fi
      - name: Score against hand-labeled expectations
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
        run: PYTHONPATH=engine/src python -m btw_engine.evalrun
      - name: Per-model comparison (recall / precision / ledger cost)
        if: ${{ inputs.compare }}
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
        run: PYTHONPATH=engine/src python -m btw_engine.evalrun --compare
