name: review-promote
on:
  pull_request:
    types: [closed]
permissions:
  contents: write
  actions: write
jobs:
  promote:
    if: >-
      github.event.pull_request.merged == true &&
      startsWith(github.event.pull_request.head.ref, 'review/')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: {python-version: "3.12"}
      - run: pip install httpx
      - name: Promote staged facts to published
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
          REVIEW_FILE: ${{ github.event.pull_request.head.ref }}.md
          MERGE_COMMIT_SHA: ${{ github.event.pull_request.merge_commit_sha }}
        run: >-
          PYTHONPATH=engine/src python -m btw_engine.review --promote
          --review-file "$REVIEW_FILE" --merge-sha "$MERGE_COMMIT_SHA"
      - name: Regenerate mirror files
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
          BTW_ARCHIVE_BASE_URL: ${{ vars.BTW_ARCHIVE_BASE_URL }}
        run: PYTHONPATH=engine/src python -m btw_engine.publish --out out
      - name: Push mirror branch
        run: |
          git clone --no-checkout https://x-access-token:${{ github.token }}@github.com/${{ github.repository }}.git mirror-repo
          cd mirror-repo
          if git ls-remote --exit-code origin mirror >/dev/null 2>&1; then
            git checkout mirror
          else
            git checkout --orphan mirror
            git rm -rf --quiet . 2>/dev/null || true
          fi
          mkdir -p data
          cp ../out/* data/
          printf '# btw mirror (generated)\n\nDo not edit by hand. Regenerated by review-promote from Postgres.\nLicense: CC BY 4.0. Cite as: Behind the Watt, behindthewatt.com.\n' > README.md
          git config user.name "btw-bot"
          git config user.email "bot@behindthewatt.com"
          git add -A
          git diff --cached --quiet && echo "no changes" && exit 0
          git commit -m "promote: $(date -u +%F) review merge"
          git push origin mirror
      - name: Rebuild dossier pages
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh workflow run pages.yml --ref main
