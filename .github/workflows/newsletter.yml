name: newsletter-worker
on:
  push:
    branches: [main]
    paths: ["newsletter/**", ".github/workflows/newsletter.yml"]
  workflow_dispatch: {}
permissions:
  contents: read
jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: npm
          cache-dependency-path: newsletter/package-lock.json
      - run: npm ci
        working-directory: newsletter
      - run: npm test
        working-directory: newsletter
      - run: npm run type-check
        working-directory: newsletter
      - run: npm run deploy
        working-directory: newsletter
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
