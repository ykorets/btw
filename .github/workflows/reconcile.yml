name: reconcile-provenance
on:
  workflow_dispatch:
    inputs:
      stage:
        description: "Create staging fact versions and open the sealed review PR"
        type: boolean
        default: false
permissions:
  contents: write
  pull-requests: write
jobs:
  reconcile:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: {python-version: "3.12"}
      - uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0
        with:
          version: "0.11.28"
          enable-cache: true
          cache-dependency-glob: "engine/uv.lock"
      - name: Install the locked engine runtime
        run: uv sync --locked
        working-directory: engine
      - name: Plan or stage reconciled fact versions
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
          R2_ACCOUNT_ID: "5ee73f367499e0cda9acfbd5966274e5"
          R2_ACCESS_KEY: ${{ secrets.R2_ACCESS_KEY }}
          R2_SECRET: ${{ secrets.R2_SECRET }}
        run: |
          if [ "${{ inputs.stage }}" = "true" ]; then
            engine/.venv/bin/python -m btw_engine.normalize
          else
            engine/.venv/bin/python -m btw_engine.normalize --dry-run
          fi
      - name: Open sealed review PR
        if: ${{ inputs.stage }}
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
          GITHUB_TOKEN: ${{ github.token }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          AUTOMERGE: "false"
        run: engine/.venv/bin/python -m btw_engine.review --open
