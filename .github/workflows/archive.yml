name: archive-backfill
on:
  workflow_dispatch: {}
jobs:
  archive:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: {python-version: "3.12"}
      - run: pip install httpx boto3 pyyaml
      - name: Archive genesis documents to R2
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
          R2_ACCOUNT_ID: "5ee73f367499e0cda9acfbd5966274e5"  # account id is not a secret (visible in dashboard URLs)
          R2_ACCESS_KEY: ${{ secrets.R2_ACCESS_KEY }}
          R2_SECRET: ${{ secrets.R2_SECRET }}
        run: PYTHONPATH=engine/src python -m btw_engine.fetch --backfill engine/backfill/genesis_docs.yaml
