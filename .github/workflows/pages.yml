name: pages
on:
  push:
    branches: [main]
    paths: ["site/**"]
  workflow_dispatch: {}
permissions:
  pages: write
  id-token: write
  contents: read
jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/upload-pages-artifact@v3
        with: {path: site}
      - id: deployment
        uses: actions/deploy-pages@v4
