name: publish-mirror
on:
  workflow_dispatch: {}
permissions:
  contents: write
  actions: write
jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: {python-version: "3.12"}
      - run: pip install httpx
      - name: Generate mirror files from Postgres
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
        run: PYTHONPATH=engine/src python -m btw_engine.publish --out out
      - name: Push mirror branch (same repo, built-in token)
        # TODO(M5): switch target back to ykorets/btw-data once GH_BOT_TOKEN
        # has Contents+PR write there (decisions.md D4 amendment).
        run: |
          git clone --no-checkout https://x-access-token:${{ github.token }}@github.com/${{ github.repository }}.git mirror-repo
          cd mirror-repo
          if git ls-remote --exit-code origin mirror >/dev/null 2>&1; then
            git checkout mirror
          else
            git checkout --orphan mirror
            git rm -rf --quiet . 2>/dev/null || true
          fi
          mkdir -p data
          cp ../out/* data/
          printf '# btw mirror (generated)\n\nDo not edit by hand. Regenerated by publish-mirror from Postgres.\nLicense: CC BY 4.0. Cite as: Behind the Watt, behindthewatt.com.\n' > README.md
          git config user.name "btw-bot"
          git config user.email "bot@behindthewatt.com"
          git add -A
          git diff --cached --quiet && echo "no changes" && exit 0
          git commit -m "publish: $(date -u +%F) mirror export"
          git push origin mirror
      - name: Rebuild dossier pages
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh workflow run pages.yml --ref main
